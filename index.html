<style>
    /* ---------- RESET & BASE ---------- */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body, html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
        background: #f4f7fb;
        color: #1e293b;
    }

    /* ---------- MAPA ---------- */
    #map {
        width: 100vw;
        height: 100vh;
        z-index: 1;
    }

    /* ---------- BARRA LATERAL ESQUERDA (VIDRO FOSCO) ---------- */
    #sidebar {
        position: absolute;
        top: 0;
        left: 0;
        width: 380px;
        height: 100vh;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 4px 0 30px rgba(0, 20, 10, 0.08);
        z-index: 20;
        display: flex;
        flex-direction: column;
        transition: transform 0.35s cubic-bezier(0.23, 1, 0.32, 1);
        border-right: 1px solid rgba(255, 255, 255, 0.3);
    }

    #sidebar.hidden {
        transform: translateX(-100%);
    }

    /* Botão toggle */
    #toggle-sidebar {
        position: absolute;
        top: 20px;
        left: 380px;
        z-index: 30;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-left: none;
        border-radius: 0 16px 16px 0;
        width: 36px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.05);
        transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
        color: #0f4c2f;
        font-size: 20px;
        font-weight: 400;
    }

    #toggle-sidebar:hover {
        background: white;
        color: #0a351f;
    }

    #sidebar.hidden + #toggle-sidebar {
        left: 0;
        border-radius: 0 16px 16px 0;
    }

    /* Cabeçalho da Sidebar */
    .sidebar-header {
        padding: 24px 20px 16px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .logo-area {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 20px;
    }

    .logo-icon {
        width: 48px;
        height: 48px;
        background: linear-gradient(145deg, #0f4c2f, #1b6e43);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 24px;
        box-shadow: 0 8px 16px -6px rgba(15, 76, 47, 0.2);
    }

    .logo-text h1 {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        font-size: 26px;
        color: #0f4c2f;
        line-height: 1.1;
        letter-spacing: -0.02em;
    }

    .logo-text p {
        font-size: 11px;
        color: #5b7a6b;
        letter-spacing: 0.4px;
        font-weight: 500;
    }

    /* Stats cards */
    .stats-cards {
        display: flex;
        gap: 12px;
        margin: 18px 0 16px;
    }

    .stat-card {
        flex: 1;
        padding: 14px 10px;
        border-radius: 20px;
        background: rgba(240, 253, 244, 0.6);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
        transition: transform 0.15s;
    }

    .stat-card:hover {
        transform: translateY(-2px);
    }

    .stat-card.amber {
        background: rgba(255, 251, 235, 0.7);
    }

    .stat-label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: #4b6b5a;
        margin-bottom: 8px;
    }

    .stat-value {
        font-weight: 700;
        font-size: 22px;
        letter-spacing: -0.02em;
    }

    .stat-card .stat-value { color: #0f4c2f; }
    .stat-card.amber .stat-value { color: #9a4d0e; }

    /* Busca */
    .search-wrapper {
        position: relative;
        margin-top: 8px;
    }

    .search-wrapper input {
        width: 100%;
        padding: 14px 18px 14px 48px;
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 30px;
        font-size: 14px;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        transition: all 0.2s;
        outline: none;
        color: #1e293b;
        font-weight: 400;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }

    .search-wrapper input:focus {
        border-color: #2b8c5e;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 6px 16px rgba(43, 140, 94, 0.08);
    }

    .search-wrapper input::placeholder {
        color: #8ba09a;
        font-weight: 400;
    }

    .search-icon {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: #5b8c75;
        font-size: 18px;
        opacity: 0.8;
    }

    .clear-search {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #7e9a8f;
        cursor: pointer;
        font-size: 18px;
        display: none;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        align-items: center;
        justify-content: center;
    }

    .clear-search:hover {
        background: rgba(0, 0, 0, 0.05);
        color: #1e293b;
    }

    .search-wrapper input:not(:placeholder-shown) ~ .clear-search {
        display: flex;
    }

    .result-count {
        font-size: 11px;
        color: #628a78;
        margin-top: 10px;
        padding-left: 6px;
        font-weight: 500;
    }

    /* Lista de Municípios */
    #city-list-container {
        flex: 1;
        overflow-y: auto;
        padding: 8px 12px 20px;
        scrollbar-width: thin;
        scrollbar-color: #bcd0c7 #eaf1ed;
    }

    .city-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 16px;
        border-radius: 18px;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
        margin-bottom: 4px;
        border: 1px solid transparent;
        background: transparent;
    }

    .city-item:hover {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
        transform: scale(1.01);
        border-color: rgba(255, 255, 255, 0.8);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
    }

    .city-item.active {
        background: linear-gradient(105deg, rgba(240, 253, 244, 0.9) 0%, rgba(255, 255, 255, 0.9) 100%);
        border: 1px solid #bbf7d0;
        box-shadow: 0 6px 12px rgba(43, 140, 94, 0.06);
    }

    .city-number {
        width: 40px;
        height: 40px;
        background: #edf4f1;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 15px;
        color: #2e5a48;
        flex-shrink: 0;
        transition: all 0.2s;
    }

    .city-item.active .city-number {
        background: #0f4c2f;
        color: white;
        box-shadow: 0 6px 10px rgba(15, 76, 47, 0.2);
    }

    .city-info {
        flex: 1;
        min-width: 0;
    }

    .city-name {
        font-weight: 600;
        font-size: 15px;
        color: #1a2e26;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .city-meta {
        font-size: 11px;
        color: #618a7a;
        margin-top: 4px;
        font-weight: 500;
    }

    .city-chevron {
        color: #a8c3b7;
        font-size: 20px;
        flex-shrink: 0;
        opacity: 0.7;
    }

    .sidebar-footer {
        padding: 16px 20px;
        border-top: 1px solid rgba(0, 0, 0, 0.05);
        font-size: 10px;
        color: #7b9b8d;
        text-align: center;
        font-weight: 500;
        letter-spacing: 0.4px;
    }

    /* ---------- PAINEL DE DETALHES (DIREITA) ---------- */
    #detail-panel {
        position: absolute;
        top: 0;
        right: 0;
        width: 460px;
        height: 100vh;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: -4px 0 30px rgba(0, 20, 10, 0.06);
        z-index: 20;
        transform: translateX(100%);
        transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        display: flex;
        flex-direction: column;
        border-left: 1px solid rgba(255, 255, 255, 0.5);
    }

    #detail-panel.visible {
        transform: translateX(0);
    }

    .detail-header {
        position: relative;
        padding: 30px 26px 24px;
        color: white;
        min-height: 150px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        background-size: cover;
    }

    .close-detail {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 40px;
        height: 40px;
        border-radius: 40px;
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        font-size: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
    }

    .close-detail:hover {
        background: rgba(255, 255, 255, 0.4);
        transform: scale(1.05);
    }

    .detail-badge {
        background: rgba(255, 255, 255, 0.2);
        padding: 6px 16px;
        border-radius: 40px;
        font-size: 13px;
        font-weight: 600;
        display: inline-block;
        width: fit-content;
        margin-bottom: 10px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .detail-city-name {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        font-size: 36px;
        line-height: 1.15;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .detail-content {
        flex: 1;
        overflow-y: auto;
        padding: 24px 26px;
        scrollbar-width: thin;
    }

    /* Cards */
    .card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        border-radius: 28px;
        padding: 22px;
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.04);
        margin-bottom: 20px;
        transition: transform 0.2s;
    }

    .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 14px 28px -8px rgba(0, 0, 0, 0.06);
        background: rgba(255, 255, 255, 0.8);
    }

    .card-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 18px;
    }

    .card-icon {
        width: 48px;
        height: 48px;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 22px;
        box-shadow: 0 6px 12px -4px rgba(0, 0, 0, 0.1);
    }

    .card-title {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: #4a6b5e;
    }

    .card-subtitle {
        font-size: 10px;
        color: #7f9e90;
        margin-top: 2px;
        font-weight: 500;
    }

    .big-number {
        font-size: 38px;
        font-weight: 700;
        line-height: 1.1;
        margin-bottom: 8px;
        letter-spacing: -0.02em;
    }

    /* Accordion */
    .accordion {
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.6);
        overflow: hidden;
        margin-bottom: 20px;
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        box-shadow: 0 6px 14px -6px rgba(0, 0, 0, 0.02);
    }

    .accordion-header {
        padding: 18px 22px;
        background: rgba(255, 255, 255, 0.4);
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        user-select: none;
        transition: background 0.2s;
    }

    .accordion-header:hover {
        background: rgba(255, 255, 255, 0.7);
    }

    .accordion-title {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 600;
        font-size: 14px;
        color: #1f4033;
    }

    .accordion-badge {
        background: rgba(255, 255, 255, 0.9);
        padding: 4px 14px;
        border-radius: 30px;
        font-size: 13px;
        font-weight: 700;
        border: 1px solid rgba(0, 0, 0, 0.05);
        color: #0f4c2f;
    }

    .accordion-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.35s ease;
        background: rgba(255, 255, 255, 0.3);
    }

    .accordion-content.open {
        max-height: 700px;
        overflow-y: auto;
    }

    /* Filtros */
    .filter-bar {
        padding: 14px 18px;
        background: rgba(248, 250, 249, 0.6);
        border-bottom: 1px solid rgba(0, 0, 0, 0.03);
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .filter-btn {
        padding: 6px 16px;
        border-radius: 30px;
        font-size: 12px;
        font-weight: 500;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.9);
        cursor: pointer;
        transition: all 0.15s;
        color: #375e4e;
    }

    .filter-btn.active {
        background: #0f4c2f;
        border-color: #0f4c2f;
        color: white;
        box-shadow: 0 4px 8px rgba(15, 76, 47, 0.2);
    }

    .deputy-item, .vereador-item {
        padding: 14px 18px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.03);
        display: flex;
        align-items: center;
        gap: 14px;
        transition: background 0.15s;
    }

    .deputy-item:hover, .vereador-item:hover {
        background: rgba(255, 255, 255, 0.5);
    }

    .deputy-rank {
        width: 32px;
        height: 32px;
        border-radius: 32px;
        background: #eaf1ed;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: #2e5a48;
        flex-shrink: 0;
    }

    .deputy-info {
        flex: 1;
    }

    .deputy-name {
        font-weight: 600;
        font-size: 14px;
        color: #1a2e26;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
    }

    .deputy-party {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 30px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.3px;
    }

    .deputy-votes {
        font-weight: 700;
        font-size: 16px;
        color: #1e293b;
        text-align: right;
    }

    .votes-label {
        font-size: 10px;
        color: #7b9b8d;
        font-weight: 400;
    }

    .elected-badge {
        font-size: 9px;
        font-weight: 800;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 30px;
        background: #fef3c7;
        color: #92400e;
    }

    /* Legenda */
    #legend {
        position: absolute;
        bottom: 28px;
        left: 28px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 18px 22px;
        border-radius: 28px;
        box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.08);
        z-index: 15;
        border: 1px solid rgba(255, 255, 255, 0.6);
        transition: left 0.3s;
    }

    #sidebar.hidden ~ #legend {
        left: 28px;
    }

    .legend-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: #0f4c2f;
        margin-bottom: 14px;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
    }

    .legend-color {
        width: 20px;
        height: 12px;
        border-radius: 20px;
    }

    .legend-label {
        font-size: 12px;
        color: #375e4e;
        font-weight: 500;
    }

    /* Título flutuante */
    #map-title {
        position: absolute;
        top: 24px;
        right: 28px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 16px 26px;
        border-radius: 40px;
        box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.06);
        z-index: 15;
        border: 1px solid rgba(255, 255, 255, 0.6);
        text-align: right;
    }

    #map-title h2 {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        font-size: 22px;
        color: #0f4c2f;
        letter-spacing: -0.01em;
    }

    #map-title p {
        font-size: 11px;
        color: #5b7a6b;
        font-weight: 500;
    }

    /* Loading */
    .loading-overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #f4f7fb;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s;
    }

    .spinner {
        width: 56px;
        height: 56px;
        border: 4px solid rgba(15, 76, 47, 0.1);
        border-top-color: #0f4c2f;
        border-radius: 50%;
        animation: spin 0.9s cubic-bezier(0.5, 0.1, 0.3, 0.9) infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar customizada */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #bcd0c7; border-radius: 10px; }
</style>
