<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paraná – Raio-X Político</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #panel {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            width: 350px; max-height: calc(100vh - 40px);
            background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; overflow: hidden;
        }
        #panel-header { padding: 16px; background: #166534; color: white; }
        #panel-header h2 { font-size: 20px; margin-bottom: 4px; }
        #panel-header p { font-size: 12px; opacity: 0.9; }
        #search-input {
            margin: 12px; padding: 10px 14px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 14px; width: calc(100% - 24px);
        }
        #city-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
        .city-item {
            padding: 10px 12px; cursor: pointer; border-radius: 8px;
            margin-bottom: 2px; display: flex; align-items: center; gap: 10px;
        }
        .city-item:hover { background: #f0f0f0; }
        .city-item.active { background: #dcfce7; }
        .city-num {
            width: 32px; height: 32px; background: #e5e7eb; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 13px; flex-shrink: 0;
        }
        .city-item.active .city-num { background: #166534; color: white; }
        .city-name { font-weight: bold; font-size: 14px; }
        .city-info-text { font-size: 12px; color: #666; }
        #detail-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 100; display: none;
            align-items: center; justify-content: center;
        }
        #detail-overlay.show { display: flex; }
        #detail-box {
            background: white; border-radius: 16px; width: 90%; max-width: 600px;
            max-height: 85vh; overflow-y: auto; padding: 24px;
        }
        #detail-box h2 { font-size: 24px; margin-bottom: 16px; color: #166534; }
        #detail-box .info-row {
            display: flex; justify-content: space-between; padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        #detail-box .info-label { font-weight: bold; color: #555; }
        #detail-box .info-value { font-weight: bold; font-size: 18px; }
        .section-title {
            font-size: 18px; font-weight: bold; margin: 20px 0 12px;
            padding-bottom: 8px; border-bottom: 2px solid #166534;
        }
        table { width: 100%; border-collapse: collapse; margin: 12px 0; }
        th { text-align: left; padding: 8px; background: #f0f0f0; font-size: 13px; }
        td { padding: 8px; border-bottom: 1px solid #eee; font-size: 13px; }
        .close-btn {
            float: right; background: none; border: none; font-size: 24px;
            cursor: pointer; color: #999;
        }
        .close-btn:hover { color: #333; }
        #toggle-btn {
            position: absolute; top: 24px; left: 380px; z-index: 10;
            background: white; border: none; border-radius: 0 8px 8px 0;
            padding: 12px 8px; cursor: pointer; box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
            font-weight: bold; color: #166534;
        }
        .hidden { display: none !important; }
        .party-tag {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 11px; font-weight: bold; margin-right: 4px;
            color: white;
        }
        .corrected-badge {
            background: #fef3c7; color: #92400e; font-size: 10px;
            padding: 2px 6px; border-radius: 10px; margin-left: 6px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div id="panel">
    <div id="panel-header">
        <h2>📍 Paraná</h2>
        <p>399 Municípios · Raio-X Político</p>
    </div>
    <input type="text" id="search-input" placeholder="Buscar município...">
    <div id="city-list"></div>
</div>

<button id="toggle-btn" onclick="togglePanel()">◀</button>

<div id="detail-overlay">
    <div id="detail-box">
        <button class="close-btn" onclick="closeDetail()">×</button>
        <h2 id="detail-title"></h2>
        <div id="detail-content"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ============ CONFIGURAÇÃO ============
var GEOJSON_URL = 'https://d2xsxph8kpxj0f.cloudfront.net/310419663030768542/7TxfinavqZokCs3hTUAwoi/parana_municipios_2d5ac5bd.geojson';
var VEREADORES_URL = 'https://d2xsxph8kpxj0f.cloudfront.net/310419663030768542/7TxfinavqZokCs3hTUAwoi/vereadores_pr_2024_66f520bf.json';
var DEP_EST_URL = 'https://d2xsxph8kpxj0f.cloudfront.net/310419663030768542/7TxfinavqZokCs3hTUAwoi/deputados_estaduais_836_por_votos_c23cdb53.json';
var DEP_FED_URL = 'https://d2xsxph8kpxj0f.cloudfront.net/310419663030768542/7TxfinavqZokCs3hTUAwoi/deputados_federais_pr_2022_6f15c9c1.json';

// ============ CORREÇÃO AUTOMÁTICA DE POPULAÇÃO ============
function corrigirPopulacao(populacao, eleitores) {
    var pop = Number(populacao) || 0;
    var ele = Number(eleitores) || 0;
    
    if (pop < ele && ele > 100) {
        // A população está provavelmente truncada; multiplicamos por 10 até superar eleitores
        var original = pop;
        while (pop < ele && pop < 10000000) {
            pop *= 10;
        }
        if (pop !== original) {
            console.log('⚠️ População corrigida: ' + original + ' → ' + pop + ' (eleitores: ' + ele + ')');
            return pop;
        }
    }
    return pop;
}

// ============ ESTADO GLOBAL ============
var map, geojsonLayer;
var municipios = [];
var vereadoresData = {};
var depEstData = {};
var depFedData = {};
var selectedMun = null;

// ============ UTILITÁRIOS ============
function formatNumber(val) {
    var n = Number(val);
    return isNaN(n) ? '0' : n.toLocaleString('pt-BR');
}

function getColor(pop) {
    var p = Number(pop) || 0;
    if (p > 500000) return '#14532D';
    if (p > 200000) return '#166534';
    if (p > 100000) return '#15803D';
    if (p > 50000) return '#16A34A';
    if (p > 20000) return '#22C55E';
    if (p > 10000) return '#4ADE80';
    return '#BBF7D0';
}

function getPartidoColor(sigla) {
    var cores = {
        'PT':'#e74c3c','PL':'#3498db','PP':'#2980b9','MDB':'#f39c12','PSD':'#e91e63',
        'UNIÃO':'#1abc9c','REPUBLICANOS':'#27ae60','PDT':'#e67e22','PSDB':'#2c3e50',
        'PODE':'#9b59b6','PSOL':'#c0392b','AVANTE':'#f1c40f','PRD':'#8e44ad',
        'SOLIDARIEDADE':'#d35400','CIDADANIA':'#16a085','PSB':'#d35400',
        'REDE':'#2ecc71','PCdoB':'#c0392b','NOVO':'#e74c3c'
    };
    return cores[sigla] || '#95a5a6';
}

// ============ RENDERIZAR LISTA ============
function renderList(data) {
    var container = document.getElementById('city-list');
    if (!data.length) {
        container.innerHTML = '<div style="padding:20px;text-align:center;color:#999;">Nenhum município</div>';
        return;
    }
    var html = '';
    for (var i = 0; i < data.length; i++) {
        var m = data[i];
        var activeClass = (selectedMun && selectedMun.numero === m.numero) ? ' active' : '';
        html += '<div class="city-item' + activeClass + '" onclick="selectMunicipio(' + m.numero + ')">' +
            '<div class="city-num">' + m.numero + '</div>' +
            '<div><div class="city-name">' + m.municipio + '</div>' +
            '<div class="city-info-text">' + formatNumber(m.populacao) + ' hab</div></div>' +
        '</div>';
    }
    container.innerHTML = html;
}

// ============ BUSCA ============
document.getElementById('search-input').addEventListener('input', function() {
    var q = this.value.toLowerCase();
    var filtered = municipios.filter(function(m) {
        return m.municipio.toLowerCase().indexOf(q) >= 0 ||
               String(m.numero).indexOf(q) >= 0;
    });
    renderList(filtered);
});

// ============ MAPA ============
function initMap(geoData) {
    map = L.map('map', {
        center: [-24.5, -51.5],
        zoom: 7,
        zoomControl: true,
        attributionControl: false
    });
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
    }).addTo(map);
    
    geojsonLayer = L.geoJSON(geoData, {
        style: function(f) {
            return {
                fillColor: getColor(f.properties.populacao),
                weight: 1,
                color: '#fff',
                fillOpacity: 0.7
            };
        },
        onEachFeature: function(f, layer) {
            layer.on({
                click: function() {
                    selectMunicipio(f.properties.numero);
                }
            });
            
            if (f.properties.lat && f.properties.lng) {
                L.marker([f.properties.lat, f.properties.lng], {
                    icon: L.divIcon({
                        html: '<div style="background:rgba(255,255,255,0.9);padding:2px 6px;border-radius:10px;font-size:10px;font-weight:bold;">' + f.properties.numero + '</div>',
                        iconSize: [30, 20],
                        iconAnchor: [15, 10]
                    }),
                    interactive: false
                }).addTo(map);
            }
        }
    }).addTo(map);
}

// ============ SELEÇÃO DE MUNICÍPIO ============
function selectMunicipio(numero) {
    selectedMun = municipios.find(function(m) { return m.numero === numero; });
    if (!selectedMun) return;
    
    // Atualizar lista visual
    document.querySelectorAll('.city-item').forEach(function(item) {
        item.classList.remove('active');
        if (parseInt(item.querySelector('.city-num').textContent) === numero) {
            item.classList.add('active');
        }
    });
    
    // Voar no mapa
    if (selectedMun.lat && selectedMun.lng) {
        map.flyTo([selectedMun.lat, selectedMun.lng], 11, { duration: 1 });
    }
    
    // Destacar no mapa
    if (geojsonLayer) {
        geojsonLayer.eachLayer(function(l) {
            if (l.feature && l.feature.properties.numero === numero) {
                l.setStyle({ weight: 3, color: '#F59E0B', fillOpacity: 0.9 });
                l.bringToFront();
            } else {
                geojsonLayer.resetStyle(l);
            }
        });
    }
    
    // Abrir detalhes
    openDetail(selectedMun);
}

// ============ DETALHES DO MUNICÍPIO ============
function openDetail(mun) {
    document.getElementById('detail-title').textContent = mun.municipio + ' (Nº ' + mun.numero + ')';
    
    var ver = vereadoresData[mun.municipio.toUpperCase()] || [];
    var est = depEstData[String(mun.numero)] || [];
    var fed = depFedData[String(mun.numero)] || [];
    
    var popCorrigida = mun.populacao;
    var popOriginal = mun.populacaoOriginal;
    
    var html = '';
    html += '<div class="info-row"><span class="info-label">👥 População (IBGE 2025)</span><span class="info-value">' + formatNumber(popCorrigida);
    if (popOriginal && popOriginal !== popCorrigida) {
        html += ' <span class="corrected-badge">corrigida</span>';
    }
    html += '</span></div>';
    
    html += '<div class="info-row"><span class="info-label">🗳️ Eleitores (TSE 2024)</span><span class="info-value">' + formatNumber(mun.eleitores) + '</span></div>';
    html += '<div class="info-row"><span class="info-label">🏛️ Prefeito(a) 2025-2028</span><span class="info-value" style="font-size:16px;">' + (mun.prefeito || 'Não informado') + '</span></div>';
    
    // Vereadores
    html += '<div class="section-title">👤 Vereadores (' + ver.length + ')</div>';
    if (ver.length > 0) {
        html += '<table><tr><th>Nome</th><th>Partido</th><th>Nº</th></tr>';
        ver.forEach(function(v) {
            html += '<tr><td>' + v.nome + '</td><td><span class="party-tag" style="background:' + getPartidoColor(v.partido) + ';">' + v.partido + '</span></td><td>' + v.numero + '</td></tr>';
        });
        html += '</table>';
    } else {
        html += '<p style="color:#999;">Dados não disponíveis</p>';
    }
    
    // Deputados estaduais
    html += '<div class="section-title">📊 Deputados Estaduais (' + est.length + ')</div>';
    if (est.length > 0) {
        html += '<table><tr><th>Nome</th><th>Partido</th><th>Votos</th><th>Status</th></tr>';
        est.forEach(function(d) {
            html += '<tr><td>' + d.n + '</td><td><span class="party-tag" style="background:' + getPartidoColor(d.p) + ';">' + d.p + '</span></td><td>' + formatNumber(d.v) + '</td><td>' + (d.e ? '⭐ Eleito' : '') + '</td></tr>';
        });
        html += '</table>';
    } else {
        html += '<p style="color:#999;">Dados não disponíveis</p>';
    }
    
    // Deputados federais
    html += '<div class="section-title">🏛️ Deputados Federais (' + fed.length + ')</div>';
    if (fed.length > 0) {
        html += '<table><tr><th>Nome</th><th>Partido</th><th>Votos</th><th>Status</th></tr>';
        fed.forEach(function(d) {
            html += '<tr><td>' + d.n + '</td><td><span class="party-tag" style="background:' + getPartidoColor(d.p) + ';">' + d.p + '</span></td><td>' + formatNumber(d.v) + '</td><td>' + (d.e ? '⭐ Eleito' : '') + '</td></tr>';
        });
        html += '</table>';
    } else {
        html += '<p style="color:#999;">Dados não disponíveis</p>';
    }
    
    document.getElementById('detail-content').innerHTML = html;
    document.getElementById('detail-overlay').classList.add('show');
}

function closeDetail() {
    document.getElementById('detail-overlay').classList.remove('show');
    selectedMun = null;
    if (geojsonLayer) geojsonLayer.resetStyle();
    document.querySelectorAll('.city-item').forEach(function(item) { item.classList.remove('active'); });
}

// ============ TOGGLE PAINEL ============
function togglePanel() {
    var panel = document.getElementById('panel');
    var btn = document.getElementById('toggle-btn');
    if (panel.classList.contains('hidden')) {
        panel.classList.remove('hidden');
        btn.textContent = '◀';
        btn.style.left = '380px';
    } else {
        panel.classList.add('hidden');
        btn.textContent = '▶';
        btn.style.left = '10px';
    }
}

// ============ CARREGAR DADOS COM CORREÇÃO ============
async function loadData() {
    try {
        var responses = await Promise.all([
            fetch(GEOJSON_URL),
            fetch(VEREADORES_URL),
            fetch(DEP_EST_URL),
            fetch(DEP_FED_URL)
        ]);
        
        var geoData = await responses[0].json();
        vereadoresData = await responses[1].json();
        depEstData = await responses[2].json();
        depFedData = await responses[3].json();
        
        municipios = geoData.features
            .filter(function(f) { return f.properties && f.properties.numero; })
            .map(function(f) {
                var popOriginal = Number(f.properties.populacao) || 0;
                var eleitores = Number(f.properties.eleitores) || 0;
                var popCorrigida = corrigirPopulacao(popOriginal, eleitores);
                
                // Atualiza também no GeoJSON para o mapa refletir as cores corretas
                f.properties.populacao = popCorrigida;
                
                return {
                    numero: f.properties.numero,
                    municipio: f.properties.municipio || 'N/A',
                    populacao: popCorrigida,
                    populacaoOriginal: (popOriginal !== popCorrigida) ? popOriginal : null,
                    eleitores: eleitores,
                    prefeito: f.properties.prefeito || '',
                    lat: f.properties.lat,
                    lng: f.properties.lng
                };
            })
            .sort(function(a, b) { return a.numero - b.numero; });
        
        console.log('✅ Municípios carregados e corrigidos:', municipios.length);
        
        renderList(municipios);
        initMap(geoData);
    } catch (err) {
        console.error('❌ Erro ao carregar dados:', err);
        alert('Erro ao carregar dados. Verifique a conexão.');
    }
}

loadData();
</script>
</body>
</html>
